name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  build:
    name: Compile & package
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
      - name: Install dependencies
        run: bun install
      - name: Compile
        run: bun run compile
      # Packages the .vsix without bundled binaries — a build smoke test only.
      # The real, binary-bundled .vsix is produced by release.yml.
      - name: Package (.vsix smoke test)
        run: bun run package
